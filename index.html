<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EntConn — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #111827;
    color: #e8e4dc;
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    padding: 2rem;
  }

  .logo-wrap {
    width: 220px;
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }

  .logo-wrap img {
    width: 100%;
    border-radius: 6px;
  }

  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, rgba(232,228,220,0.3), transparent);
    margin: 2.5rem 0;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.04em;
    color: #e8e4dc;
    line-height: 1.15;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  .sub {
    margin-top: 1.2rem;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.4);
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(232,228,220,0.3);
    margin: 0 10px;
    vertical-align: middle;
  }

  .footer {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: rgba(232,228,220,0.18);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .logo-wrap { width: 160px; }
    .divider { height: 40px; margin: 1.8rem 0; }
  }
</style>
</head>
